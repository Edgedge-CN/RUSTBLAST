[core]
copyFrom:"""ROOT:RW_Engine/View/View.md"""
name:ColliderDetectionObjectListQueueManager
tags:ColliderDetectionObjectListQueueManager
showInEditor:false
isBuilding: false
isUnselectable:true
@memory TriggerMarkList:unit[]
@memory isLocked:boolean

[hiddenAction_created]
autoTriggerOnEvent:created
resetCustomTimer:true
sendMessageTo:self.customTarget1
sendMessageWithTags:ColliderDetectionObjectListQueueManager

[hiddenAction_CheckMarkInList]
autoTriggerOnEvent:newMessage(withTag="CheckMarkInList")
setUnitMemory:TriggerMarkList[memory.TriggerMarkList.size]=eventData("mark",type="unit")

[hiddenAction_startTask]
autoTrigger:if self.customTarget1.readUnitMemory("isBusy",type="boolean") == false and memory.isLocked == false and memory.TriggerMarkList[0] != nullUnit
setUnitMemory:isLocked=true

alsoTriggerAction:send
[hiddenAction_send]
sendMessageTo:self.customTarget1
sendMessageWithTags:CheckMarkInList
sendMessageWithData:mark=memory.TriggerMarkList[0]
alsoTriggerAction:shrink

[hiddenAction_shrink]
setUnitMemory:TriggerMarkList[0]=nullUnit
shrinkArrays:TriggerMarkList
[hiddenAction_unlocked]
autoTriggerOnEvent:newMessage(withTag="unlocked")
setUnitMemory:isLocked=false