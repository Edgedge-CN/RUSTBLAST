[core]
copyFrom:ROOT:RW_Engine/Module/LayoutInterpreter/ImportLayoutInterpreter.md,ROOT:RW_Engine/View/CommonCallBack.md
name:BaseView
class:CustomUnitMetadata
tags:BaseView
price:0
maxHp:1
mass:0
buildSpeed:0
isBuilding: true
radius:0
stayNeutral:true
isBio:false
showOnMinimap:false
canNotBeDirectlyAttacked: true
canNotBeDamaged:true
autoTriggerCooldownTime:0.0s
autoTriggerCooldownTime_allowDangerousHighCPU:true
showInEditor:false

@global soltSize:12



@memory backgroundScaleX:float
@memory backgroundScaleY:float
@memory backgroundScale:float


[graphics]
total_frames:1
image:ROOT:RW_Engine/View/空.png
image_wreak:NONE
image_turret:NONE
imageSmoothing:true
[hiddenAction_created]
autoTriggerOnEvent:created
resetCustomTimer:true
setUnitMemory:backgroundScaleX=1,backgroundScaleY=1
[hiddenAction_commonRequest]
autoTriggerOnEvent:created
resetCustomTimer:true
sendMessageTo:self.customTarget1
sendMessageWithTags:commonRequest
sendMessageWithData:name="${core.name}",tags="${core.tags}"


[attack]

canAttack:false

[movement]
movementType:NONE




[hiddenAction_setBackgroundColor]
autoTriggerOnEvent:newMessage(withTag="setBackgroundColor")
switchToTeam:eventData("color",type="number")

[decal_background]
layer:onTop
image:${ViewImagePath}/background.png
imageScaleX:memory.backgroundScaleX
imageScale:1
imageScaleY:memory.backgroundScaleY
xOffsetAbsolute:(memory.backgroundScaleX-1)*10
yOffsetAbsolute:(memory.backgroundScaleY-1)*10




[action_test]
text:test
setUnitMemory:backgroundScaleY=2,backgroundScaleX=3