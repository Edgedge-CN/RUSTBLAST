[core]

copyFrom:ROOT:RW_Engine/Module/LayoutInterpreter/ImportLayoutInterpreter.md
class:CustomUnitMetadata
name:bookTest
price:0
maxHp:1
mass:0
buildSpeed:0
isBuilding: true
radius:0
isBio:false
showOnMinimap:false
canNotBeDirectlyAttacked: true
canNotBeDamaged:true
autoTriggerCooldownTime:0.01s
autoTriggerCooldownTime_allowDangerousHighCPU:true
@memory text:string
@memory textIndexStart:number
@memory onePageTextNum:number
@memory PTVSystemUnit:unit

[hiddenAction_getPTVSystemUnit]
autoTriggerOnEvent:newMessage(withTag="commonRequest")
setUnitMemory:PTVSystemUnit = eventSource
sendMessageTo:memory.PTVSystemUnit
sendMessageWithTags:setTextMax
sendMessageWithData:textMax=100
[hiddenAction_sendBuff]
buildSpeed:0.0s
sendMessageTo:memory.PTVSystemUnit
sendMessageWithTags:setText
sendMessageWithData:text=substring(memory.text,memory.textIndexStart,memory.textIndexStart+memory.onePageTextNum)
[action_length]
text:总字数:%{length(memory.text)}  %{memory.textIndexStart}
isVisible:true
[action_previousPage]
buildSpeed:0.0s
text:上一页
setUnitMemory:textIndexStart=memory.textIndexStart-memory.onePageTextNum
alsoQueueAction:sendBuff
[action_nextPage]
buildSpeed:0.0s
text:下一页
setUnitMemory:textIndexStart=memory.textIndexStart+memory.onePageTextNum
alsoQueueAction:sendBuff
[hiddenAction_created]
autoTriggerOnEvent:created
resetCustomTimer:true
spawnUnits:LineTextViewSystem
setUnitMemory:textIndexStart=0,onePageTextNum=1000,text="""'《道诡异仙》
Tested
'"""

[graphics]
total_frames:1
image:空.png
image_wreak:NONE
image_turret:NONE

[attack]

canAttack:false

[movement]
movementType:NONE
