[core]
name:bigrock
displayText:大型太空岩石
displayDescription:-可以打似并爆出红宝石
class:CustomUnitMetadata
price:0
maxHp:10000
mass:1000
techLevel:1
buildSpeed:0.001
radius:30
isBio:false
createOnAggressiveTeam:true
tags:fe,genb
unitsSpawnedOnDeath:red3*3(spawnChance=0.5, maxSpawnLimit=3,offsetRandomXY=25)
canNotBeGivenOrdersByPlayer:false
explodeOnDeath:false
[attack]
canAttack:false
[graphics]
scaleImagesTo:60
showHealthBar:false
icon_zoomed_out:ROOT:icon/rock.png
total_frames:1
image:bigrock.png
image_wreak:NONE
image_shadow:NONE
shadowOffsetX:0
shadowOffsetY:2
[movement]
movementType:AIR
targetHeight:0.3
targetHeightDrift:0.1
moveSpeed:1
moveAccelerationSpeed:1
moveDecelerationSpeed:1
maxTurnSpeed:1
turnAcceleration:0.001
moveIgnoringBody:true
[decal_bar_mine]
color: #784e00
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.hp / self.maxHp)*40
alwaysStartDirAtZero:true
isVisible:if not (self.hp == self.maxHp)
onlyOnNonPreview:true
xOffsetAbsolute:((self.hp/self.maxHp)*40)-40
yOffsetAbsolute:45
alpha:0.8
onlyWhileActive:true
[decal_mine_back]
color: #360b0b
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.hp == self.maxHp)
imageScale:2
imageScaleX:40
alpha:0.5
alwaysStartDirAtZero:true
onlyOnNonPreview:true
yOffsetAbsolute:45
onlyWhileActive:true