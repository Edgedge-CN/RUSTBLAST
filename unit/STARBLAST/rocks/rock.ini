[core]
name:rock
displayText:太空岩石
displayDescription:-可以打似并爆出红宝石
class:CustomUnitMetadata
price:0
maxHp:3500
mass:100
techLevel:1
buildSpeed:0.001
radius:15
disableAllUnitCollisions:true
isBio:false
createOnAggressiveTeam:true
tags:fe
unitsSpawnedOnDeath:red2*3(spawnChance=0.5, maxSpawnLimit=3,offsetRandomXY=10)
canNotBeGivenOrdersByPlayer:false
explodeOnDeath:false
[attack]
canAttack:false
[graphics]
scaleImagesTo:45
showHealthBar:false
icon_zoomed_out:ROOT:icon/rock.png
total_frames:1
image:rock.png
image_wreak:NONE
image_shadow:NONE
shadowOffsetX:0
shadowOffsetY:2
disableLowHpFire:true
disableLowHpSmoke:true
[movement]
movementType:AIR
targetHeight:0.3
targetHeightDrift:0.1
moveSpeed:0.02
moveAccelerationSpeed:0.001
moveDecelerationSpeed:0
maxTurnSpeed:0.001
turnAcceleration:0.001
moveIgnoringBody:true
[decal_bar_mine]
color: #784e00
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.hp / self.maxHp)*15
alwaysStartDirAtZero:true
isVisible:if not (self.hp == self.maxHp)
