y:0
canShoot:false
idleSpin:0.8
[turret_bddmg]
resourceUsage:hp=1
limitingRange:30
canAttackMaxAngle:181
x:0
y:0
projectile:1
size:1
turnSpeed:100
turnSpeedAcceleration:1
[projectile_1]
pushForce:100
directDamage:65
life:45
speed:30
frame:1
image:triangle.png
drawSize:0.001
[movement]
movementType:LAND
moveSpeed:0.6
moveAccelerationSpeed:0.05
moveDecelerationSpeed:0.001
maxTurnSpeed:1.2
turnAcceleration:0.1
moveIgnoringBody:true
[decal_bar_mine]
color: #4bff60
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.hp / self.maxHp)*10
alwaysStartDirAtZero:true
isVisible:if not (self.hp == self.maxHp)
