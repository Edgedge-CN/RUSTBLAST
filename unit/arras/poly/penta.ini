xOffsetAbsolute:((self.hp/self.maxHp)*10)-10
yOffsetAbsolute:15
alpha:0.8
onlyWhileActive:true
[decal_mine_back]
color: #323135
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.hp == self.maxHp)
imageScale:2
imageScaleX:10
alpha:0.9
alwaysStartDirAtZero:true
onlyOnNonPreview:true
yOffsetAbsolute:15
onlyWhileActive:true
