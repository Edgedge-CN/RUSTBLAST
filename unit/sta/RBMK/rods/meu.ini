targetHeight:5
maxTurnSpeed:20
targetHeightDrift:1
[ai]
ai_upgradePriority:0.8

[action_re]
convertTo:rodEmp
displayType:upgrade
price:红宝石=-500
text:取消装填
buildSpeed:2s
whenBuilding_cannotMove:true
highPriorityQueue:true
isLocked:if self.resource.fluxf>20
isLockedMessage:您来晚辣
#int(self.x() + rnd(-3,3)),int(self.y() +f rnd(-3,3))
[hiddenAction_fluxe]
autoTrigger:true
addResourcesWithLogic:fluxf=(parent.resource.fluxss*(1 - self.resource.xenon/100))*0.4+1,dt=parent.resource.fluxss*0.4
[hiddenAction_xenonPosion]
autoTrigger:true
requireConditional:if ((self.resource.xenon+(parent.resource.fluxss*0.5-0.02*parent.resource.fluxss*parent.resource.fluxss))<=100 or ((self.resource.xenon+(parent.resource.fluxss*0.5-0.02*parent.resource.fluxss*parent.resource.fluxss)>0)))
# 屎山代码
addResourcesWithLogic:xenon=parent.resource.fluxss*0.5-0.02*parent.resource.fluxss*parent.resource.fluxss

[hiddenAction_fluxout]
autoTrigger:if self.resource.fluxf>100
addResources:fluxf=-10
spawnUnits:Mboom
[action_fluxfdisp]
iconImage:neutf.png
isVisible:true
text:(%{self.resource.fluxf})
