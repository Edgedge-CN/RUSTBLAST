[core]
showInEditor:false
name:meu
displayText:中浓缩铀棒[自燃]
displayDescription:中子放射函数[LINAR]:x*0.4+1\n每接受一个中子产生的热量:0.8K\n氙元素产生:x*0.5\n氙元素燃烧:x^2/50
maxHp:1000
autoTriggerCheckRate:every4Frames
price:红宝石=1000
shieldDisplayOnlyDeflection:true
mass:100
radius:4
