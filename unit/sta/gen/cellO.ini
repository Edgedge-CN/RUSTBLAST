[core]
name:cellO
displayText:单片机
displayDescription:-简陋的CPU\n-你应该叫它MCU\n+1MB/40F\n-1kW
maxHp:1000
showInEditor:true
price:红宝石=500
maxShield:2000
shieldRegen:0.1
shieldDisplayOnlyDeflection:true
borrowResourcesWhileAlive:电力=1
mass:1000
radius:7
generation_resources:data=1
generation_active:if (not (self.resource.data > self.resource.datamax)and self.resource.电力>0)
[graphics]
scaleImagesTo:10
image:cellO.png
image_wreak:NONE
image_turret:NONE
image_shadow:NONE
lock_body_rotation_with_main_turret:true

[attack]
canAttack:false
canAttackFlyingUnits:false
canAttackLandUnits:false
canAttackUnderwaterUnits:false
[movement]
movementType:NONE
targetHeight:5
maxTurnSpeed:20
targetHeightDrift:1
[ai]
ai_upgradePriority:0.8


[action_1]
convertTo:PCB
displayType:upgrade
price:红宝石=-500
text:回收
buildSpeed:2s
whenBuilding_cannotMove:true
highPriorityQueue:true
ai_isDisabled:true
[effect_dust]
delayedStartTimerRandom:45
image:datadot.png
life:40
scaleFrom:0.2
scaleTo:0.6
priority:critical
alpha:1
xSpeedAbsoluteRandom:3
ySpeedAbsoluteRandom:3
hSpeedRandom:0.5
hSpeed:1
dirSpeedRandom:0.5
dirSpeed:1

[animation_dust]
onActions:idle
effect_2s:{x:0,y:2,name:dust*3}