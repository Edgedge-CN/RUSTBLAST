turnAcceleration:0.5
moveSlidingMode:false
moveIgnoringBody:false


[decal_bar_mine]
color: #ff2222
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.hp / self.maxHp)*25
alwaysStartDirAtZero:true
isVisible:if not (self.hp == self.maxHp)
onlyOnNonPreview:true
xOffsetAbsolute:((self.hp/self.maxHp)*25)-25
yOffsetAbsolute:-25
alpha:0.8
onlyWhileActive:true
[decal_mine_back]
color: #360b0b
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.hp == self.maxHp)
imageScale:2
imageScaleX:25
alpha:0.5
alwaysStartDirAtZero:true
onlyOnNonPreview:true
yOffsetAbsolute:-25
onlyWhileActive:true

[decal_bar_sd]
color: #22ffda
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.shield / self.maxShield)*25
alwaysStartDirAtZero:true
isVisible:if not (self.shield == self.maxShield)
onlyOnNonPreview:true
xOffsetAbsolute:((self.shield / self.maxShield)*25)-25
yOffsetAbsolute:-20
alpha:0.8
onlyWhileActive:true
[decal_sd_back]
color: #004869
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.shield == self.maxShield)
imageScale:2
imageScaleX:25
alpha:0.5
yOffsetAbsolute:-20
alwaysStartDirAtZero:true
onlyOnNonPreview:true
onlyWhileActive:true

[decal_bar_en]
color: #ffd622
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.energy / self.maxEnergy)*15
alwaysStartDirAtZero:true
isVisible:if not (self.energy == self.maxEnergy)
onlyOnNonPreview:true
xOffsetAbsolute:((self.energy / self.maxEnergy)*15)-15
yOffsetAbsolute:30
