[core]
name:oclb
displayText:板块-改(驱逐舰)
displayText_en:ocla_bs
displayDescription:火炮被替换为激光拦截器的板块\n-移速稳定\n-血量偏高
displayDescription_en:-$null ha ha ha
class:CustomUnitMetadata
price:红宝石=2200
tags:btsp
maxHp:3000
mass:30
techLevel:1
buildSpeed:0.0004
radius:25
isBio:false
fogOfWarSightRange:15
builtFrom_1_name:stafc2
builtFrom_3_name:motherShip
shieldDisplayOnlyDeflection:true
maxShield:4000
shieldRegen:1
unitsSpawnedOnDeath:Mboom
explodeOnDeathGroundCollision:false
explodeOnDeath:false
energyMax:20
energyRegen:0.1
showActionsWithMixedSelectionIfOtherUnitsHaveTag:btsp
[graphics]
icon_zoomed_out:ROOT:icon/btsp2.png
total_frames:1
image:oclb.png
image_wreak:NONE
scaleImagesTo:40
lock_body_rotation_with_main_turret:false
image_shadow:AUTO
shadowOffsetX:1
shadowOffsetY:1
showEnergyBar:false
showHealthBar:false
showShieldBar:false
turretImageScale:0.7
disableLowHpSmoke:true
disableLowHpFire:true
[attack]
canAttack:false
canAttackFlyingUnits:false
canAttackLandUnits:false
canAttackUnderwaterUnits:false
maxAttackRange:300
[turret_1]
x:0
y:0
laserDefenceEnergyUse:1
[movement]
movementType:HOVER
moveSpeed:1.4
moveAccelerationSpeed:0.03
moveDecelerationSpeed:0.1
joinsGroupFormations:false
maxTurnSpeed:2
turnAcceleration:0.5
moveSlidingMode:false
moveIgnoringBody:false

[ai]
buildPriority:0.7
noneInBaseExtraPriority:0.8
noneGlobalExtraPriority:0.8
maxEachBase:30
maxGlobal:80

[decal_bar_mine]
color: #ff2222
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.hp / self.maxHp)*30
alwaysStartDirAtZero:true
isVisible:if not (self.hp == self.maxHp)
onlyOnNonPreview:true
xOffsetAbsolute:((self.hp/self.maxHp)*30)-30
yOffsetAbsolute:-25
alpha:0.8
onlyWhileActive:true
[decal_mine_back]
color: #360b0b
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.hp == self.maxHp)
imageScale:2
imageScaleX:30
alpha:0.5
alwaysStartDirAtZero:true
onlyOnNonPreview:true
yOffsetAbsolute:-25
onlyWhileActive:true

[decal_bar_sd]
color: #22ffda
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.shield / self.maxShield)*30
alwaysStartDirAtZero:true
isVisible:if not (self.shield == self.maxShield)
onlyOnNonPreview:true
xOffsetAbsolute:((self.shield / self.maxShield)*30)-30
yOffsetAbsolute:-30
alpha:0.8
onlyWhileActive:true
[decal_sd_back]
color: #004869
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.shield == self.maxShield)
imageScale:2
imageScaleX:30
alpha:0.5
yOffsetAbsolute:-30
alwaysStartDirAtZero:true
onlyOnNonPreview:true
onlyWhileActive:true

[decal_bar_en]
color: #ffd622
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.energy / self.maxEnergy)*15
alwaysStartDirAtZero:true
isVisible:if not (self.energy == self.maxEnergy)
onlyOnNonPreview:true
xOffsetAbsolute:((self.energy / self.maxEnergy)*15)-15
yOffsetAbsolute:30
alpha:0.7
onlyWhileActive:true
[decal_en_back]
color: #555522
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.energy == self.maxEnergy)
imageScale:2
imageScaleX:15
alpha:0.5
yOffsetAbsolute:30
alwaysStartDirAtZero:true
onlyOnNonPreview:true
onlyWhileActive:true

[decal_sctC]
image:ROOT:sct.png
onlyWhileActive:true
alwaysStartDirAtZero:true
onlyWhenSelectedByOwnPlayer:true
imageScale:0.04*${core.radius}
teamColors:true
