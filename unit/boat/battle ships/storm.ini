[core]
name:storm
displayText:风暴(战舰)
displayText_en:Tunder
displayDescription:战列舰\n-模块化()\n-武器繁多\n-移速low\n-盾厚
displayDescription_en:-$null ha ha ha
class:CustomUnitMetadata
price:红宝石=25000
tags:btsp
maxHp:8000
mass:60
techLevel:1
buildSpeed:0.0001
radius:43
isBio:false
fogOfWarSightRange:15
builtFrom_3_name:motherShip

shieldDisplayOnlyDeflection:true
maxShield:8000
shieldRegen:3.5
unitsSpawnedOnDeath:Mboom
explodeOnDeathGroundCollision:false
explodeOnDeath:false
energyMax:100
energyRegen:0.2

showActionsWithMixedSelectionIfOtherUnitsHaveTag:btsp

[graphics]
icon_zoomed_out:ROOT:icon/btsp3.png
total_frames:1
image:storm.png
image_wreak:NONE
scaleImagesTo:55
lock_body_rotation_with_main_turret:false
image_shadow:AUTO
shadowOffsetX:1
shadowOffsetY:1
showEnergyBar:false
showHealthBar:false
showShieldBar:false
disableLowHpSmoke:true
disableLowHpFire:true
[attack]
canAttack:true
canAttackFlyingUnits:true
canAttackLandUnits:true
canAttackUnderwaterUnits:false
maxAttackRange:220
turretRotateWithBody:true

[movement]
movementType:HOVER
moveSpeed:0.8
moveAccelerationSpeed:0.1
moveDecelerationSpeed:0.1
joinsGroupFormations:false
maxTurnSpeed:0.6
turnAcceleration:0.5
moveSlidingMode:false
moveIgnoringBody:false

[ai]
buildPriority:0.03
noneInBaseExtraPriority:0.02
noneGlobalExtraPriority:0.08
maxEachBase:7
maxGlobal:45

[decal_bar_mine]
color: #ff2222
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.hp / self.maxHp)*60
alwaysStartDirAtZero:true
isVisible:if not (self.hp == self.maxHp)
onlyOnNonPreview:true
xOffsetAbsolute:((self.hp/self.maxHp)*60)-60
yOffsetAbsolute:-45
alpha:0.8
onlyWhileActive:true
[decal_mine_back]
color: #360b0b
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.hp == self.maxHp)
imageScale:2
imageScaleX:60
alpha:0.5
alwaysStartDirAtZero:true
onlyOnNonPreview:true
yOffsetAbsolute:-45
onlyWhileActive:true

[decal_bar_sd]
color: #22ffda
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.shield / self.maxShield)*60
alwaysStartDirAtZero:true
isVisible:if not (self.shield == self.maxShield)
onlyOnNonPreview:true
xOffsetAbsolute:((self.shield / self.maxShield)*60)-60
yOffsetAbsolute:-40
alpha:0.8
onlyWhileActive:true
[decal_sd_back]
color: #004869
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.shield == self.maxShield)
imageScale:2
imageScaleX:60
alpha:0.5
yOffsetAbsolute:-40
alwaysStartDirAtZero:true
onlyOnNonPreview:true
onlyWhileActive:true

[decal_bar_en]
color: #ffd622
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.energy / self.maxEnergy)*15
alwaysStartDirAtZero:true
isVisible:if not (self.energy == self.maxEnergy)
onlyOnNonPreview:true
xOffsetAbsolute:((self.energy / self.maxEnergy)*15)-15
yOffsetAbsolute:30
alpha:0.7
onlyWhileActive:true
[decal_en_back]
color: #555522
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.energy == self.maxEnergy)
imageScale:2
imageScaleX:15
alpha:0.5
yOffsetAbsolute:30
alwaysStartDirAtZero:true
onlyOnNonPreview:true
onlyWhileActive:true

[decal_sctC]
image:ROOT:sct.png
onlyWhileActive:true
alwaysStartDirAtZero:true
onlyWhenSelectedByOwnPlayer:true
imageScale:0.04*${core.radius}
teamColors:true
order:-2
alpha:0.3
[decal_sctA]
image:ROOT:sctarr_bs1.png
onlyWhileActive:true
onlyWhenSelectedByOwnPlayer:true
yOffsetRelative:${core.radius}
teamColors:true
order:-1
alpha:0.2


