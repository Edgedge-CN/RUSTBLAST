[core]
name:spectrum
displayText:光谱(巡洋舰)
displayText_en:Tunder
displayDescription:巡洋舰\n-光束的升级版本
displayDescription_en:-$null ha ha ha
class:CustomUnitMetadata
price:红宝石=9000
tags:btsp
maxHp:4500
mass:160
techLevel:1
buildSpeed:37.8s
radius:30
isBio:false
fogOfWarSightRange:15
builtFrom_3_name:motherShip

shieldDisplayOnlyDeflection:true
maxShield:6000
shieldRegen:2
unitsSpawnedOnDeath:Mboom
explodeOnDeathGroundCollision:false
explodeOnDeath:false


showActionsWithMixedSelectionIfOtherUnitsHaveTag:btsp

[graphics]
icon_zoomed_out:ROOT:icon/btsp3.png
total_frames:1
image:spectrum.png
image_wreak:NONE
scaleImagesTo:75
lock_body_rotation_with_main_turret:true
image_shadow:AUTO
shadowOffsetX:1
shadowOffsetY:1
showEnergyBar:false
showHealthBar:false
showShieldBar:false
disableLowHpSmoke:true
disableLowHpFire:true
[attack]
canAttack:true
canAttackFlyingUnits:true
canAttackLandUnits:true
canAttackUnderwaterUnits:false
maxAttackRange:280
shootDelay:1
turretRotateWithBody:true

[movement]
movementType:HOVER
moveSpeed:0.8
moveAccelerationSpeed:0.1
moveDecelerationSpeed:0.1
joinsGroupFormations:false
maxTurnSpeed:0.6
turnAcceleration:0.5
moveSlidingMode:false
moveIgnoringBody:false

[turret_1]
barrelY:32
x:0
y:0
projectile:1
turnSpeed:5
shoot_flame:NONE

shoot_sound:ROOT:/SFX/pluse.ogg
shoot_sound_vol:0.2
warmup:60
warmupCallDownRate:200
warmupNoReset: true
warmupShootDelayTransfer:1
[projectile_1]
life:15
instant:true
instantReuseLast:true
instantReuseLast_alsoChangeTurretAim:true
moveWithParent:true
beamImage:ROOT:/unit/boat/battle ships/module/laser2.png
beamImageEnd:SHARED:beam1_end.png
beamImageStart:SHARED:beam1_start.png
beamImageOffsetRate:2
explodeEffect:NONE
explodeEffectOnShield:NONE
shieldDamageMultiplier:1
sweepOffsetFromTargetRadius:0.4
sweepSpeed:1
directDamage:50
color: #ddFFFF88
teamColorRatio:1
laserEffect:true
[ai]
buildPriority:0.02
noneInBaseExtraPriority:0.02
noneGlobalExtraPriority:0.08
maxEachBase:7
maxGlobal:45

[decal_bar_mine]
color: #ff2222
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.hp / self.maxHp)*45
alwaysStartDirAtZero:true
isVisible:if not (self.hp == self.maxHp)
onlyOnNonPreview:true
xOffsetAbsolute:((self.hp/self.maxHp)*45)-45
yOffsetAbsolute:-30
alpha:0.8
onlyWhileActive:true
[decal_mine_back]
color: #360b0b
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.hp == self.maxHp)
imageScale:2
imageScaleX:45
alpha:0.5
alwaysStartDirAtZero:true
onlyOnNonPreview:true
yOffsetAbsolute:-30
onlyWhileActive:true

[decal_bar_sd]
color: #22ffda
image:SHARED:white_pixel.png
imageScale:2
imageScaleX:(self.shield / self.maxShield)*45
alwaysStartDirAtZero:true
isVisible:if not (self.shield == self.maxShield)
onlyOnNonPreview:true
xOffsetAbsolute:((self.shield / self.maxShield)*45)-45
yOffsetAbsolute:-35
alpha:0.8
onlyWhileActive:true
[decal_sd_back]
color: #004869
image:SHARED:white_pixel.png
order:-1
isVisible:if not (self.shield == self.maxShield)
imageScale:2
imageScaleX:45
alpha:0.5
yOffsetAbsolute:-35
alwaysStartDirAtZero:true
onlyOnNonPreview:true
onlyWhileActive:true

[decal_sctC]
image:ROOT:sct.png
onlyWhileActive:true
alwaysStartDirAtZero:true
onlyWhenSelectedByOwnPlayer:true
imageScale:0.04*${core.radius}
teamColors:true
order:-2
alpha:0.3
[decal_sctA]
image:ROOT:sctarr_bs1.png
onlyWhileActive:true
onlyWhenSelectedByOwnPlayer:true
yOffsetRelative:${core.radius}
teamColors:true
order:-1
alpha:0.2