total_frames:1
image:gp.png
image_wreak:NONE
scaleImagesTo:25
lock_body_rotation_with_main_turret:true
image_shadow:AUTO
shadowOffsetX:1
shadowOffsetY:1

showEnergyBar:false
showHealthBar:false
showShieldBar:false

disableLowHpSmoke:true
disableLowHpFire:true
[attack]
canAttack:true
canAttackFlyingUnits:true
canAttackLandUnits:true
canAttackUnderwaterUnits:false
maxAttackRange:200
shootDelay:3
turretRotateWithBody:true
[turret_1]
barrelY:10
x:0
y:0
projectile:1
turnSpeed:5
shoot_flame:NONE
idleSpin:1
shoot_sound:ROOT:/SFX/pluse.ogg
shoot_sound_vol:0.2
warmup:60
warmupCallDownRate:200
warmupNoReset: true
warmupShootDelayTransfer:1
[projectile_1]
life:15
instant:true
instantReuseLast:true
instantReuseLast_alsoChangeTurretAim:true
moveWithParent:true
beamImage:ROOT:/unit/boat/battle ships/module/laser.png
beamImageEnd:SHARED:beam1_end.png
beamImageStart:SHARED:beam1_start.png
beamImageOffsetRate:2
explodeEffect:NONE
explodeEffectOnShield:NONE
shieldDamageMultiplier:1
sweepOffsetFromTargetRadius:0.4
sweepSpeed:1
directDamage:10
color: #ddFFFF88
teamColorRatio:1
laserEffect:true
[movement]
