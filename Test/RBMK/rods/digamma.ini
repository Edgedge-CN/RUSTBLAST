[core]
showInEditor:false
name:dgm
displayText:迪伽马燃料棒[自燃]
displayDescription:中子放射函数[NEGATIVEPOWER/LINAR]:x*50-0.02x^2+50\n每接受一个中子产生的热量:2K\n铅元素产生:x*0.8\n铅元素燃烧:x^2/100
maxHp:1000
autoTriggerCheckRate:every4Frames
price:红宝石=1000
shieldDisplayOnlyDeflection:true
mass:100
radius:4
experimental: true
generation_resources:rad=-0.2
generation_delay:40
generation_active:if self.resource.rad>0
[graphics]
icon_zoomed_out:ROOT:rad2.png
scaleImagesTo:10
image:digamma.png
image_wreak:NONE
image_turret:NONE
image_shadow:NONE
#lock_body_rotation_with_main_turret:true
[attack]
canAttack:false
[resource_fluxf]
displayName:通量(快)
[resource_fluxs]
displayName:slowsum
[resource_dt]
displayName:deltaTemp
[resource_xenon]
displayName:氙中毒
[movement]
movementType:NONE
targetHeight:5
maxTurnSpeed:20
targetHeightDrift:1
[ai]
ai_upgradePriority:0.8

[action_re]
convertTo:rodEmp
displayType:upgrade
price:红宝石=-500
text:取消装填
buildSpeed:2s
whenBuilding_cannotMove:true
highPriorityQueue:true
isLocked:if self.resource.fluxf>20
isLockedMessage:您来晚辣
#int(self.x() + rnd(-3,3)),int(self.y() +f rnd(-3,3))
[hiddenAction_fluxe]
autoTrigger:true
addResourcesWithLogic:fluxf=(parent.resource.fluxs*(1 - self.resource.xenon/100))*25+50-0.02*parent.resource.fluxs*parent.resource.fluxs,dt=parent.resource.fluxs
[hiddenAction_xenonPosion]
autoTrigger:true
requireConditional:if ((self.resource.xenon+(parent.resource.fluxs*0.8-0.01*parent.resource.fluxs*parent.resource.fluxs))<=100 or ((self.resource.xenon+(parent.resource.fluxs*0.8-0.01*parent.resource.fluxs*parent.resource.fluxs)>0)))
# 屎山代码
addResourcesWithLogic:xenon=parent.resource.fluxs*0.5-0.02*parent.resource.fluxs*parent.resource.fluxs


[action_fluxfdisp]
iconImage:neutf.png
isVisible:true
text:(%{self.resource.fluxf})
textPostFix: 快中子通量
displayType:infoOnly
buildSpeed:0